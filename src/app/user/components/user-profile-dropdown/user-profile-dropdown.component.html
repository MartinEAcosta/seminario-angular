<div class="container-user-profile" >
    <img 
    (click)="onClickProfile()"
    src="assets/user-profile.svg" 
    alt="User icon profile" class="user-profile-img">
    <div [ngClass]="{'overlay' : this.open()}" (click)="this.onCloseDropdown()"></div>
    <div class="container-dropdown-content" [ngClass]="{ 'open': this.open() }">
                <div class="dropdown-item">
                    <a>Tu perfil</a>
                </div>
                <div class="dropdown-item" (click)="this.authService.logoutUser()">
                    <a>Cerrar sesión</a>
                </div>
            </div>
    </div>
